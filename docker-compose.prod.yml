services:
  app:
    container_name: coursework_app_prod
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      APP_NAME: "${APP_NAME}"
      APP_BASE_URL: "${APP_BASE_URL}"
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      DB_NAME: "${MYSQL_DATABASE}"
      DB_USER: "${MYSQL_USER}"
      DB_PASSWORD: "${MYSQL_PASSWORD}"
      DB_CHARSET: "${DB_CHARSET}"
    volumes:
      - ./src:/var/www/html:ro
      - ./deploy/apache/000-default.prod.conf:/etc/apache2/sites-available/000-default.conf:ro
      - ${BASIC_AUTH_FILE}:/run/secrets/coursework_htpasswd:ro

  db:
    container_name: coursework_db_prod
    image: mysql:8.0.45
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    command:
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro

volumes:
  mysql_data_prod: